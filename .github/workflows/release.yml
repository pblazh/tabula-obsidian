name: Build + Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - uses: extractions/setup-just@v3

      - name: Build
        run: just obsidian

      - name: Read version
        run: echo "VERSION=$(node -p "require('./manifest.json').version")" >> $GITHUB_ENV

      - name: Check tag
        id: check
        run: |
          git fetch --tags
          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "Tag exists, skipping release"
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "Tag does not exist, will release"
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Create git tag
        if: steps.check.outputs.skip_deploy == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${VERSION}"
          git push origin "${VERSION}"

      - name: Create GitHub Release
        if: steps.check.outputs.skip_deploy == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: |
            out/main.js
            out/styles.css
            manifest.json
            versions.json
